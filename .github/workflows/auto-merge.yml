name: Dependabot auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'app/dependabot'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check if auto-merge applicable
        id: check-semver
        run: |
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          echo "Update type: $UPDATE_TYPE"
          echo "Head ref: $HEAD_REF"
          if [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]] || \
             [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]] || \
             { [[ "$UPDATE_TYPE" == "version-update:semver-major" ]] && [[ "$HEAD_REF" == dependabot/github_actions/* ]]; }; then
            echo "should_auto_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_auto_merge=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Approve PR
        if: steps.check-semver.outputs.should_auto_merge == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.MYTOKEN }}

      - name: Enable auto-merge (wait for CI then rebase)
        if: steps.check-semver.outputs.should_auto_merge == 'true'
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.MYTOKEN }}
